<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}CarHaki — Uganda's trusted vehicle history verification platform. Check VIN and chassis history for cars imported from USA and Japan.{% endblock %}">
  <title>{% block title %}CarHaki — Verify Your Car's History{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN (dev — replace with compiled build in production) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ch-green':   '#1D4ED8',
            'ch-green-l': '#2563EB',
            'ch-dark':    '#0C1F3F',
            'ch-navy':    '#1E3A8A',
            'ch-gold':    '#60A5FA',
            'ch-gold-d':  '#3B82F6',
            'ch-light':   '#F8FAFC',
            'ch-surface': '#F8FAFC',
            'ch-success': '#065F46',
            'ch-danger':  '#991B1B',
            'ch-warn':    '#92400E',
          },
          fontFamily: {
            heading: ['Plus Jakarta Sans', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
            mono:    ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Chart.js for odometer timeline -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5 { font-family: 'Plus Jakarta Sans', sans-serif; }
    code, pre, .font-mono { font-family: 'JetBrains Mono', monospace; }
    .btn-primary {
      @apply bg-ch-green hover:bg-ch-green-l text-white font-heading font-semibold px-6 py-3 rounded-lg transition-all duration-200 shadow-sm;
    }
    .btn-outline {
      @apply border-2 border-ch-green text-ch-green hover:bg-ch-green hover:text-white font-heading font-semibold px-6 py-3 rounded-lg transition-all duration-200;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-white text-gray-800 font-body">

  <!-- Navbar -->
  {% include "components/navbar.html" %}

  <!-- Django Messages -->
  {% if messages %}
  <div class="max-w-7xl mx-auto px-4 mt-4">
    {% for message in messages %}
    <div class="flex items-center justify-between p-4 mb-2 rounded-lg
      {% if message.tags == 'error' %}bg-red-50 border border-red-300 text-red-800
      {% elif message.tags == 'success' %}bg-green-50 border border-green-300 text-green-800
      {% elif message.tags == 'warning' %}bg-yellow-50 border border-yellow-300 text-yellow-800
      {% else %}bg-blue-50 border border-blue-300 text-blue-800{% endif %}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="ml-4 opacity-60 hover:opacity-100 text-xl leading-none">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Main content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include "components/footer.html" %}

  {% block extra_js %}{% endblock %}
</body>
</html>
