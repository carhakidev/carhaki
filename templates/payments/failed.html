{% extends "base.html" %}
{% block title %}Payment Failed — CarHaki{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-16 text-center">
  <div class="text-6xl mb-6">❌</div>
  <h1 class="font-heading font-bold text-3xl text-ch-green mb-3">Payment Not Completed</h1>
  <p class="text-gray-600 mb-8">Your payment was not confirmed. You have not been charged. Please try again.</p>

  <a href="{% url 'payments:checkout' order.pk %}"

    Try Again

  <br>
  <a href="{% url 'vehicles:home' %}" class="text-ch-green text-sm hover:underline mt-4 inline-block">Back to Home</a>
