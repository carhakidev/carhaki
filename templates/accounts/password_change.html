{% extends "base.html" %}
{% block title %}Change Password — CarHaki{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <h2 class="mb-4">Change Password</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary w-100 mt-3">Update Password</button>
  </form>
</div>
{% endblock %}
