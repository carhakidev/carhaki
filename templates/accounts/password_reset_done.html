{% extends "base.html" %}
{% load static %}
{% block title %}Check Your Email — CarHaki{% endblock %}

{% block content %}
<div style="background:var(--ch-surface);min-height:100vh;padding:80px 24px;">
  <div class="container-sm" style="max-width:440px;text-align:center;">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--ch-ok-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--ch-ok)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h1 class="font-display" style="font-size:24px;font-weight:800;color:var(--ch-navy);margin-bottom:12px;">Check your email</h1>
    <p style="font-size:15px;color:var(--ch-text-3);line-height:1.7;margin-bottom:28px;">
      We've sent a password reset link to your email address. It expires in 24 hours.
      Check your spam folder if you don't see it.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to Sign In</a>
  </div>
</div>
{% endblock %}
