{% extends "base.html" %}
{% load static %}
{% block title %}Reset Password — CarHaki{% endblock %}

{% block content %}
<div style="background:var(--ch-surface);min-height:100vh;padding:80px 24px;">
  <div class="container-sm" style="max-width:440px;">

    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--ch-blue-faint);border:1px solid var(--ch-blue-pale);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ch-blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="font-display" style="font-size:24px;font-weight:800;color:var(--ch-navy);margin-bottom:8px;">Reset your password</h1>
      <p style="font-size:14px;color:var(--ch-text-3);line-height:1.6;max-width:360px;margin:0 auto;">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <div style="background:white;border:1px solid var(--ch-border);border-radius:var(--r-xl);padding:36px;box-shadow:var(--shadow-sm);">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_email">Email Address</label>
          <div class="form-input-icon">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="form-input" type="email" id="id_email" name="email"
                   placeholder="you@email.com" autocomplete="email" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">
          Send Reset Link
        </button>
      </form>
    </div>

    <p style="text-align:center;font-size:14px;color:var(--ch-text-3);margin-top:24px;">
      Remembered it?
      <a href="{% url 'accounts:login' %}" style="color:var(--ch-blue);font-weight:600;">Sign in →</a>
    </p>

  </div>
</div>
{% endblock %}
