{% extends "base.html" %}
{% block title %}Reset Your Password — CarHaki{% endblock %}

{% block content %}
<div class="min-h-screen bg-ch-light flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <a href="/" class="text-ch-green font-heading font-bold text-2xl">CarHaki</a>
      <h1 class="font-heading font-bold text-2xl text-ch-green mt-4">Reset Your Password</h1>
      <p class="text-gray-600 mt-2 text-sm">
        Enter your email address and we will send you a link to reset your password.
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-4">
          <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input
            type="email" name="email" id="id_email" autocomplete="email" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ch-gold"
            placeholder="your@email.com"
          >
        </div>
        <button type="submit" class="btn-primary w-full text-center">
          Send Reset Link
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-600 mt-6">
      Remembered your password?
      <a href="{% url 'accounts:login' %}" class="text-ch-gold hover:underline font-medium">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
