{% extends "base.html" %}
{% load static %}
{% block title %}Password Reset Successful — CarHaki{% endblock %}

{% block content %}
<div style="background:var(--ch-surface);min-height:100vh;padding:80px 24px;">
  <div class="container-sm" style="max-width:440px;text-align:center;">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--ch-ok-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--ch-ok)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h1 class="font-display" style="font-size:24px;font-weight:800;color:var(--ch-navy);margin-bottom:12px;">Password updated!</h1>
    <p style="font-size:15px;color:var(--ch-text-3);line-height:1.7;margin-bottom:28px;">
      Your password has been successfully changed. You can now sign in with your new password.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">Sign In Now</a>
  </div>
</div>
{% endblock %}
