{% extends "base.html" %}
{% block title %}Password Reset Complete — CarHaki{% endblock %}

{% block content %}
<div class="min-h-screen bg-ch-light flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full text-center">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-10">
      <div class="w-16 h-16 bg-ch-green rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="font-heading font-bold text-2xl text-ch-green mb-3">Password Changed</h1>
      <p class="text-gray-600 text-sm mb-6">
        Your password has been set successfully. You can now log in with your new password.
      </p>
      <a href="{% url 'accounts:login' %}" class="btn-primary inline-block">
        Log In Now
      </a>
    </div>
  </div>
</div>
{% endblock %}
