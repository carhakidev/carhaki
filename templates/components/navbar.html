{% load static %}

<nav class="nav">
  <div class="nav-inner">

    <!-- ── Logo ─────────────────────────────────────────────── -->
    <a href="{% url 'vehicles:home' %}" class="nav-logo" aria-label="CarHaki home"
       style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      <img src="{% static 'images/carhaki-mark-40.svg' %}"
           alt="" aria-hidden="true"
           style="width:32px;height:32px;display:block;flex-shrink:0;">
      <span class="font-display"
            style="font-size:18px;font-weight:800;color:white;letter-spacing:-.3px;white-space:nowrap;">
        Car<span style="color:var(--ch-blue-light);">Haki</span>
      </span>
    </a>

    <!-- ── Desktop links ─────────────────────────────────────── -->
    <div class="nav-links">
      <a href="{% url 'vehicles:pricing' %}" class="nav-link {% if request.resolver_match.url_name == 'pricing' %}active{% endif %}">Pricing</a>
      <a href="{% url 'vehicles:faq' %}"     class="nav-link {% if request.resolver_match.url_name == 'faq'     %}active{% endif %}">FAQ</a>
      <a href="{% url 'vehicles:about' %}"   class="nav-link {% if request.resolver_match.url_name == 'about'   %}active{% endif %}">About</a>
    </div>

    <!-- ── Desktop actions ───────────────────────────────────── -->
    <div class="nav-actions">
      {% if user.is_authenticated %}
        <a href="{% url 'accounts:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               style="display:inline;vertical-align:-2px;margin-right:4px;" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Dashboard
        </a>
        <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="nav-btn-ghost" style="cursor:pointer;">Sign Out</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}"    class="nav-btn-ghost">Sign In</a>
        <a href="{% url 'accounts:register' %}" class="nav-btn-primary">Get Started</a>
      {% endif %}
    </div>

    <!-- ── Mobile toggle ─────────────────────────────────────── -->
    <button id="nav-toggle" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <svg id="icon-open" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           style="display:none;" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

  </div>
</nav>

<!-- ── Mobile menu ─────────────────────────────────────────── -->
<div id="nav-mobile" class="nav-mobile" role="navigation" aria-label="Mobile menu">

  <a href="{% url 'vehicles:pricing' %}" class="nav-link">Pricing</a>
  <a href="{% url 'vehicles:faq' %}"     class="nav-link">FAQ</a>
  <a href="{% url 'vehicles:about' %}"   class="nav-link">About</a>

  <div class="nav-mobile-divider"></div>

  <div class="nav-mobile-actions">
    {% if user.is_authenticated %}
      <a href="{% url 'accounts:dashboard' %}" class="nav-link">Dashboard</a>
      <form method="post" action="{% url 'accounts:logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-ghost btn-sm"
                style="width:100%;justify-content:center;cursor:pointer;">Sign Out</button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}"    class="btn btn-ghost btn-sm"    style="justify-content:center;">Sign In</a>
      <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm"  style="justify-content:center;">Get Started</a>
    {% endif %}
  </div>

</div>

<script>
  (function () {
    const toggle = document.getElementById('nav-toggle');
    const menu   = document.getElementById('nav-mobile');
    const open   = document.getElementById('icon-open');
    const close  = document.getElementById('icon-close');

    toggle.addEventListener('click', function () {
      const isOpen = menu.classList.toggle('open');
      open.style.display  = isOpen ? 'none'  : 'block';
      close.style.display = isOpen ? 'block' : 'none';
      toggle.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('click', function (e) {
      if (!toggle.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('open');
        open.style.display  = 'block';
        close.style.display = 'none';
        toggle.setAttribute('aria-expanded', 'false');
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && menu.classList.contains('open')) {
        menu.classList.remove('open');
        open.style.display  = 'block';
        close.style.display = 'none';
        toggle.setAttribute('aria-expanded', 'false');
        toggle.focus();
      }
    });
  })();
</script>
