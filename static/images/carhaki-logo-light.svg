<svg width="220" height="52" viewBox="0 0 220 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CarHaki — Vehicle Intelligence Uganda">
  <title>CarHaki</title>
  <defs>
    <linearGradient id="shG" x1="20" y1="2" x2="20" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1E3A8A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Shield mark -->
  <g filter="url(#shShadow)">
    <path d="M20 2L38 8V24C38 33.8 30.2 42.2 20 44.5C9.8 42.2 2 33.8 2 24V8L20 2Z"
          fill="url(#shG)"/>
    <path d="M20 4.5L35.5 9.8V24C35.5 32.6 28.6 40.4 20 42.4C11.4 40.4 4.5 32.6 4.5 24V9.8L20 4.5Z"
          fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <path d="M11.5 23L17.5 29L28.5 15"
          stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark — white "Car" + light-blue "Haki" — both visible on dark backgrounds -->
  <text x="48" y="29"
        font-family="'Plus Jakarta Sans','Arial Black',Arial,sans-serif"
        font-weight="800" font-size="26" fill="#FFFFFF" letter-spacing="-0.8">Car</text>
  <text x="96" y="29"
        font-family="'Plus Jakarta Sans','Arial Black',Arial,sans-serif"
        font-weight="800" font-size="26" fill="#60A5FA" letter-spacing="-0.8">Haki</text>

  <!-- Tagline -->
  <text x="48" y="44"
        font-family="system-ui,-apple-system,sans-serif"
        font-weight="500" font-size="9" fill="rgba(255,255,255,0.38)" letter-spacing="0.1em">VEHICLE INTELLIGENCE · UGANDA</text>
</svg>
